name: ci
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r src/requirements.txt
      - name: Run unit tests
        run: pytest -q
      - name: Validate SAM template
        run: sam validate
