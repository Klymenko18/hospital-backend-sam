AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hospital Mini Backend (Cognito + HTTP API + Lambda + DynamoDB; dashboard via API; cycle-safe)

Parameters:
  DomainPrefix:
    Type: String
    Description: Unique Cognito Hosted UI domain prefix (e.g., hospital-mini-max-12345)
  AdminEmail:
    Type: String
    Default: admin@example.com
    Description: Admin email for seeding/demo

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    CodeUri: src

Resources:
  # ---------------- Cognito ----------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-userpool'
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true

  # TEMP callbacks to avoid CFN cycles; updated post-deploy via CLI
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub '${AWS::StackName}-web'
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      SupportedIdentityProviders: [COGNITO]
      CallbackURLs: ['https://example.com/']
      LogoutURLs:   ['https://example.com/']
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  # ---------------- DynamoDB ----------------
  PatientTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-patients'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: patient_id
          AttributeType: S
      KeySchema:
        - AttributeName: patient_id
          KeyType: HASH

  # ---------------- HTTP API (+ JWT authorizer w/o audience to avoid cycles) ----------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: ['Authorization','Content-Type']
        AllowMethods: ['GET','OPTIONS']
      Auth:
        DefaultAuthorizer: CognitoJwtAuth
        Authorizers:
          CognitoJwtAuth:
            IdentitySource: '$request.header.Authorization'
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'

  # ---------------- Functions ----------------

  DashboardFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      Handler: handlers.dashboard.handler
      Environment:
        Variables:
          REGION: !Ref AWS::Region
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          COGNITO_DOMAIN: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
      Events:
        Admin:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin
            Method: GET
            Auth: { Authorizer: NONE }
        AdminSlash:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/
            Method: GET
            Auth: { Authorizer: NONE }
        AdminConfig:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/config.js
            Method: GET
            Auth: { Authorizer: NONE }

  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      Handler: handlers.health.handler
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
            Auth: { Authorizer: NONE }

  AdminMetricsFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      Handler: handlers.admin_metrics.handler
      Environment:
        Variables:
          PATIENT_TABLE_NAME: !Ref PatientTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PatientTable
      Events:
        AdminMetricsRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/metrics
            Method: GET

  MeRecordFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      Handler: handlers.me_record.handler
      Environment:
        Variables:
          PATIENT_TABLE_NAME: !Ref PatientTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PatientTable
      Events:
        MeRecordRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/record
            Method: GET

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Web Client ID
    Value: !Ref UserPoolClient
  PatientTableName:
    Description: DynamoDB table name
    Value: !Ref PatientTable
  CognitoDomain:
    Description: Hosted UI domain
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  DashboardURL:
    Description: HTTPS URL for admin dashboard
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/admin'
