AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hospital Mini-Backend (Cognito + HTTP API + Lambda + DynamoDB + S3 Dashboard)

Parameters:
  DashboardBucketName:
    Type: String
    Description: Globally-unique S3 bucket name for hosting the admin dashboard
  DomainPrefix:
    Type: String
    Description: Unique Cognito Hosted UI domain prefix (e.g., hospital-mini-max)
  AdminEmail:
    Type: String
    Default: admin@example.com
    Description: Seed admin username (email)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref PatientTable
        LOG_LEVEL: INFO

Resources:
  PatientTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-patients'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: patient_id
          AttributeType: S
      KeySchema:
        - AttributeName: patient_id
          KeyType: HASH

  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DashboardBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
    DeletionPolicy: Retain

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${DashboardBucketName}/*'

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-userpool'
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub '${AWS::StackName}-web'
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      SupportedIdentityProviders: [COGNITO]
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs:
        - !Sub 'http://${DashboardBucketName}.s3-website-${AWS::Region}.amazonaws.com/'
      LogoutURLs:
        - !Sub 'http://${DashboardBucketName}.s3-website-${AWS::Region}.amazonaws.com/'
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool

  PatientsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: patients
      UserPoolId: !Ref UserPool

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'http://${DashboardBucketName}.s3-website-${AWS::Region}.amazonaws.com'
        AllowHeaders: ['Authorization','Content-Type']
        AllowMethods: ['GET','OPTIONS']
      Auth:
        Authorizers:
          CognitoJwtAuth:
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience:
                - !Ref UserPoolClient
            IdentitySource: '$request.header.Authorization'
        DefaultAuthorizer: CognitoJwtAuth

  MeRecordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-me-record'
      CodeUri: src/
      Handler: handlers.me_record.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ['dynamodb:GetItem']
              Resource: !GetAtt PatientTable.Arn
      Events:
        GetMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/record
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuth

  AdminMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-admin-metrics'
      CodeUri: src/
      Handler: handlers.admin_metrics.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: ['dynamodb:Scan','dynamodb:DescribeTable']
              Resource: !GetAtt PatientTable.Arn
      Events:
        GetMetrics:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/metrics
            Method: GET
            Auth:
              Authorizer: CognitoJwtAuth

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-health'
      CodeUri: src/
      Handler: handlers.health.handler
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  HttpApiId:
    Description: HTTP API ID
    Value: !Ref HttpApi
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Web Client ID
    Value: !Ref UserPoolClient
  CognitoDomain:
    Description: Hosted UI domain
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  DashboardURL:
    Description: S3 website URL for dashboard
    Value: !Sub 'http://${DashboardBucketName}.s3-website-${AWS::Region}.amazonaws.com'
  PatientTableName:
    Description: DynamoDB table name
    Value: !Ref PatientTable
