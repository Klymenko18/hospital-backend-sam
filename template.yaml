AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hospital Mini-Backend — SAM stack (Cognito + DDB + JWT Authorizer + Admin Dashboard)

Parameters:
  CognitoDomainPrefix:
    Type: String
    Description: Unique prefix for Cognito Hosted UI domain (e.g., hospital-mini-<random>)
  DashboardBucketName:
    Type: String
    Description: Globally-unique S3 bucket name for admin dashboard (e.g., hospital-mini-dashboard-<random>)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        APP_ENV: prod
        TABLE_NAME: !Ref PatientRecordsTable

Resources:
  # ------------------ Cognito ------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: hospital-mini-user-pool
      AutoVerifiedAttributes: [ email ]
      UsernameAttributes: [ email ]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: hospital-mini-app-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders: [ COGNITO ]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [ implicit ]
      AllowedOAuthScopes: [ openid, email, profile ]
      CallbackURLs:
        - !Sub "http://${DashboardBucketName}.s3-website.${AWS::Region}.amazonaws.com/"
      LogoutURLs:
        - !Sub "http://${DashboardBucketName}.s3-website.${AWS::Region}.amazonaws.com/"

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  GroupPatients:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: patients
      UserPoolId: !Ref UserPool
      Precedence: 10

  GroupAdmin:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Precedence: 1

  # ------------------ DynamoDB ------------------
  PatientRecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "PatientRecords-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: patientId
          AttributeType: S
      KeySchema:
        - AttributeName: patientId
          KeyType: HASH

  # ------------------ HTTP API + JWT Authorizer ------------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods: [ GET ]
        AllowOrigins:
          - !Sub "http://${DashboardBucketName}.s3-website.${AWS::Region}.amazonaws.com"
          - "*"
        AllowHeaders: [ Authorization, Content-Type ]
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"

  # ------------------ Lambdas ------------------
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: health.lambda_handler
      CodeUri: src/
      Description: Public health check
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        GetHealth:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE     # публічний маршрут

  PatientMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: patient_me.lambda_handler
      CodeUri: src/
      Description: Returns current patient's record from DynamoDB
      Environment:
        Variables:
          PK_NAME: patientId      # важливо для пошуку по email
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref PatientRecordsTable
      Events:
        GetMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /patient/me
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  AdminMetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: admin_metrics.lambda_handler
      CodeUri: src/
      Description: Returns aggregated admin metrics from DynamoDB
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref PatientRecordsTable
      Events:
        GetMetrics:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/metrics
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  # ------------------ S3 Dashboard ------------------
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DashboardBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${DashboardBucketName}/*"

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: Cognito User Pool Id
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client Id
    Value: !Ref UserPoolClient
  CognitoIssuer:
    Description: JWT issuer URL for the authorizer
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
  DashboardURL:
    Description: S3 static website URL for the admin dashboard
    Value: !Sub "http://${DashboardBucketName}.s3-website.${AWS::Region}.amazonaws.com/"
