AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hospital mini-backend (Cognito + HTTP API + Lambda + DynamoDB)

Globals:
  Function:
    Runtime: python3.11
    Timeout: 10
    MemorySize: 256
    Architectures: [x86_64]
    Environment:
      Variables:
        TABLE_NAME: !Ref PatientTable

Resources:
  #####################################################
  # Cognito
  #####################################################
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-pool'
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  UserPoolWebClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      SupportedIdentityProviders: [COGNITO]
      CallbackURLs:
        - !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/admin'
      LogoutURLs:
        - !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/admin'

  CognitoDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${AWS::StackName}-${AWS::AccountId}'
      UserPoolId: !Ref UserPool

  #####################################################
  # DynamoDB
  #####################################################
  PatientTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-patients'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: patient_id
          AttributeType: S
      KeySchema:
        - AttributeName: patient_id
          KeyType: HASH

  #####################################################
  # HTTP API + Authorizer
  #####################################################
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: ['Authorization','Content-Type']
        AllowMethods: ['GET','OPTIONS']
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: '$request.header.Authorization'
            JwtConfiguration:
              audience:
                - !Ref UserPoolWebClient
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
        DefaultAuthorizer: None

  #####################################################
  # Lambda: health (public)
  #####################################################
  HealthFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      CodeUri: src/handlers
      Handler: health.handler
      Events:
        HealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE

  #####################################################
  # Lambda: dashboard (HTML + config.js)
  #####################################################
  DashboardFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      CodeUri: src/handlers
      Handler: dashboard.handler
      Events:
        AdminHtml:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin
            Method: GET
            Auth:
              Authorizer: NONE
        AdminConfig:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/config.js
            Method: GET
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          TABLE_NAME: !Ref PatientTable
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolWebClient
          API_BASE: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
          COGNITO_DOMAIN: !Sub 'https://${CognitoDomain}.auth.${AWS::Region}.amazoncognito.com'

  #####################################################
  # Lambda: admin metrics (protected by Cognito group "admin")
  #####################################################
  AdminMetricsFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      CodeUri: src/handlers
      Handler: admin_metrics.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PatientTable
      Events:
        AdminMetrics:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/metrics
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  #####################################################
  # Lambda: me record (authenticated user)
  #####################################################
  MeRecordFunction:
    Type: AWS::Serverless::Function
    Metadata: { BuildMethod: makefile }
    Properties:
      CodeUri: src/handlers
      Handler: me_record.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PatientTable
      Events:
        MeRecord:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /me/record
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UserPoolId:
    Description: Cognito User Pool Id
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Web Client Id
    Value: !Ref UserPoolWebClient
  CognitoDomain:
    Description: Hosted UI domain
    Value: !Sub 'https://${CognitoDomain}.auth.${AWS::Region}.amazoncognito.com'
  PatientTableName:
    Description: DynamoDB table name
    Value: !Ref PatientTable
