<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Hospital Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu; margin: 2rem; }
    button { padding: .6rem 1rem; border: 1px solid #ccc; border-radius: .5rem; cursor: pointer; }
    .card { border: 1px solid #e5e7eb; border-radius: 1rem; padding: 1rem; margin-top: 1rem; }
    .muted { color: #6b7280; font-size: .9rem; }
  </style>
  <script src="https://unpkg.com/aws-amplify@5.3.21/dist/aws-amplify.min.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <h1>Admin Metrics</h1>
  <div id="auth">
    <button id="login">Sign In</button>
    <button id="logout" style="display:none">Sign Out</button>
  </div>
  <div class="card">
    <div><strong>Total patients:</strong> <span id="total">–</span></div>
    <div style="margin-top:.5rem"><strong>Top diagnoses:</strong>
      <ul id="dx"></ul>
    </div>
    <div class="muted" id="ts"></div>
  </div>

  <script>
    const cfg = window.DASHBOARD_CFG;
    const { Auth } = aws_amplify;

    Auth.configure({
      region: cfg.region,
      userPoolId: cfg.userPoolId,
      userPoolWebClientId: cfg.userPoolWebClientId,
      oauth: {
        domain: cfg.domain.replace(/^https?:\/\//,''),
        scope: cfg.scopes,
        redirectSignIn: cfg.redirectSignIn,
        redirectSignOut: cfg.redirectSignOut,
        responseType: "code"
      }
    });

    const loginBtn = document.getElementById("login");
    const logoutBtn = document.getElementById("logout");
    const totalEl = document.getElementById("total");
    const dxEl = document.getElementById("dx");
    const tsEl = document.getElementById("ts");

    async function ensureSession() {
      try {
        const session = await Auth.currentSession();
        return session.getIdToken().getJwtToken();
      } catch {
        return null;
      }
    }

    async function fetchMetrics() {
      const token = await ensureSession();
      if (!token) return;

      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";

      const res = await fetch(`${cfg.apiBaseUrl}/admin/metrics`, {
        method: "GET",
        headers: { Authorization: `Bearer ${token}` }
      });

      if (!res.ok) {
        totalEl.textContent = "error";
        dxEl.innerHTML = "";
        tsEl.textContent = `HTTP ${res.status}`;
        return;
      }

      const data = await res.json();
      totalEl.textContent = data.total_patients;
      dxEl.innerHTML = "";
      (data.top_diagnoses || []).forEach(d => {
        const li = document.createElement("li");
        li.textContent = `${d.diagnosis} — ${d.count}`;
        dxEl.appendChild(li);
      });
      tsEl.textContent = data.timestamp_utc;
    }

    loginBtn.onclick = () => Auth.federatedSignIn();
    logoutBtn.onclick = () => Auth.signOut();

    (async () => { await fetchMetrics(); })();
    window.addEventListener("focus", fetchMetrics);
  </script>
</body>
</html>
